<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CNI Manager - Connexion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar">
    <div class="brand-block">
        <span class="brand-chip">CNI</span>
        <div>
            <p class="kicker">Plateforme Nationale</p>
            <h1>CNI Operations Console</h1>
        </div>
    </div>
    <nav class="main-nav auth-nav">
        <a class="nav-link nav-pill active" href="/login.html">Connexion</a>
        <a class="nav-link nav-pill" href="/register.html">Inscription</a>
    </nav>
</header>

<main class="page-shell auth-page">
    <section class="auth-showcase">
        <section class="auth-panel">
            <div class="auth-brand">
                <div class="auth-brand-badge">CNI</div>
                <p class="brand-line">Plateforme<span style="color: var(--primary); font-weight: 700;"> Nationale CNI</span></p>
                <h2>Bienvenue</h2>
                <p>Connectez-vous pour acceder a votre compte.</p>
            </div>

            <article class="card auth-card primary-card">
                <div class="auth-stack">
                    <form id="login-form" class="form-grid">
                        <label>Adresse email<input name="email" type="email" required></label>
                        <label>Mot de passe<input name="password" type="password" required></label>
                        <a class="form-hint" href="/forgot-password.html">Mot de passe oublie ?</a>
                        <button class="btn" type="submit">Se connecter</button>
                    </form>

                    <p class="muted-text">Nouveau sur notre plateforme ? <a class="inline-link" href="/register.html">Creer un compte</a></p>
                </div>
            </article>

            <article class="card">
                <div class="row between">
                    <h2>Console API</h2>
                    <button id="clear-logs" class="btn btn-muted" type="button">Effacer</button>
                </div>
                <pre id="log-output" class="output">Pret.</pre>
            </article>
        </section>
    </section>
</main>

<script src="/auth.js"></script>
</body>
</html>
